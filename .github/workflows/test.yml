name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Check CLI with config
        run: |
          python -m ragguard check-mask --help
          set +e
          python -m ragguard check-mask --input tests/fixtures/fail --output outputs/ci_fail_config --config config/rules.yaml
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "Expected exit code 2 for fail fixture with --config, got $status"
            exit 1
          fi

      - name: Check benchmark CLI
        run: |
          python -m ragguard benchmark --help
          python -m ragguard benchmark --corpus tests/fixtures/benchmark/corpus --queries tests/fixtures/benchmark/queries.jsonl --output outputs/ci_benchmark_report

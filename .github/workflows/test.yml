name: Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pip install pytest

      - name: Run tests
        run: python -m pytest

      - name: Check CLI with config
        run: |
          python -m ragguard check-mask --help
          set +e
          python -m ragguard check-mask --input tests/fixtures/fail --output outputs/ci_fail_config --config config/rules.yaml
          status=$?
          set -e
          if [ "$status" -ne 2 ]; then
            echo "Expected exit code 2 for fail fixture with --config, got $status"
            exit 1
          fi

      - name: Check benchmark CLI
        run: |
          python -m ragguard benchmark --help
          python -m ragguard benchmark --corpus tests/fixtures/benchmark/corpus --queries tests/fixtures/benchmark/queries.jsonl --output outputs/ci_benchmark_report

      - name: Check local adapter skeleton boundary
        run: python -m pytest tests/test_benchmark.py::test_local_adapter_skeleton_reaches_cli_error_3

      - name: Check local-rag synthetic end-to-end contract
        run: python -m pytest tests/test_local_rag_e2e.py

      - name: Check HTTP transport security end-to-end
        run: python -m pytest tests/test_http_transport_security_e2e.py

      - name: Check benchmark exit codes
        run: |
          mkdir -p outputs/ci_benchmark_cases
          printf '%s\n' '{"query_id":"q_pass","question":"Where are sample policy documents stored?","expected_source_ids":["sample-policy-001"],"expected_keywords":["sample archive"],"expected_answer_hint":"sample archive","no_result_expected":false,"unsafe_or_unknown_expected":false}' > outputs/ci_benchmark_cases/pass.jsonl
          printf '%s\n' '{"query_id":"q_warning","question":"Where are sample policy documents stored?","expected_source_ids":["sample-policy-001"],"expected_keywords":["sample archive","missing marker"],"expected_answer_hint":"","no_result_expected":false,"unsafe_or_unknown_expected":false}' > outputs/ci_benchmark_cases/warning.jsonl
          printf '%s\n' '{"query_id":"q_fail","question":"zzzz qqqq yyyy","expected_source_ids":["sample-policy-001"],"expected_keywords":[],"expected_answer_hint":"","no_result_expected":false,"unsafe_or_unknown_expected":false}' > outputs/ci_benchmark_cases/fail.jsonl
          printf '%s\n' '{bad json' > outputs/ci_benchmark_cases/invalid.jsonl

          check_benchmark_status() {
            expected="$1"
            name="$2"
            queries="$3"
            set +e
            python -m ragguard benchmark --corpus tests/fixtures/benchmark/corpus --queries "$queries" --output "outputs/ci_benchmark_cases/$name"
            status=$?
            set -e
            if [ "$status" -ne "$expected" ]; then
              echo "Expected exit code $expected for benchmark $name case, got $status"
              exit 1
            fi
          }

          check_benchmark_status 0 pass outputs/ci_benchmark_cases/pass.jsonl
          check_benchmark_status 1 warning outputs/ci_benchmark_cases/warning.jsonl
          check_benchmark_status 2 fail outputs/ci_benchmark_cases/fail.jsonl
          check_benchmark_status 3 invalid outputs/ci_benchmark_cases/invalid.jsonl

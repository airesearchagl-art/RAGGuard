# Future extension sample. This file is not loaded by the MVP runtime.
version: 1

# v0.2 design direction:
# - extend_builtin keeps the built-in safety rules and adds user-defined rules.
# - replace_builtin is intentionally not part of the v0.2 MVP plan.
mode: extend_builtin

rules:
  - rule_id: email_address_custom
    category: personal_info
    severity: FAIL
    type: regex
    pattern: "[A-Za-z0-9._%+-]+@[A-Za-z0-9.-]+\\.[A-Za-z]{2,}"
    recommendation: "RAG_OK投入前にメールアドレスをマスクしてください。"
    redaction: partial

  - rule_id: amount_keyword
    category: money
    severity: FAIL
    type: regex
    pattern: "(?:税込|税別)?\\s*(?:\\d{1,3}(?:,\\d{3})+|\\d+)(?:\\.\\d+)?\\s*(?:円|万円|億円|千円)(?:\\s*(?:税込|税別))?"
    recommendation: "RAG_OK投入前に具体的な金額情報をマスクしてください。"
    redaction: label

  - rule_id: rate_keyword
    category: money
    severity: FAIL
    type: regex
    pattern: "(?:(?:料率|利率|手数料率).{0,10})?\\d+(?:\\.\\d+)?\\s*(?:%|％|パーセント)"
    recommendation: "RAG_OK投入前に料率情報をマスクしてください。"
    redaction: label

  - rule_id: unit_price_keyword
    category: money
    severity: FAIL
    type: regex
    pattern: "(?:(?:坪単価|平米単価|㎡単価|m2単価|m²単価)\\s*(?:[:：=]\\s*)?(?:\\d{1,3}(?:,\\d{3})+|\\d+)?(?:\\.\\d+)?\\s*(?:円|万円|億円|千円)?|(?:\\d{1,3}(?:,\\d{3})+|\\d+)(?:\\.\\d+)?\\s*(?:円|万円|億円|千円)\\s*/\\s*(?:坪|㎡|m2|m²))"
    recommendation: "RAG_OK投入前に坪単価・平米単価情報をマスクしてください。"
    redaction: label

  - rule_id: address_postal_code_custom
    category: address_candidate
    severity: FAIL
    type: regex
    pattern: "\\b\\d{3}-\\d{4}\\b"
    recommendation: "RAG_OK投入前に郵便番号や住所候補をマスクしてください。"
    redaction: label

  - rule_id: address_context_custom
    category: address_candidate
    severity: FAIL
    type: regex
    pattern: "(?:住所|所在地|現地|物件所在地).{0,30}(?:\\d+丁目|\\d+番地|\\d+号|.{1,20}(?:ビル|建物|棟))"
    recommendation: "RAG_OK投入前に住所候補の記述を確認し、必要に応じてマスクしてください。"
    redaction: label

  - rule_id: budget_keyword
    category: money
    severity: WARNING
    type: keyword
    keywords:
      - "予算"
      - "概算"
      - "見積"
    recommendation: "文脈を確認し、必要に応じて金額情報をマスクしてください。"
    redaction: label

  - rule_id: contract_sensitive_keyword
    category: contract
    severity: FAIL
    type: keyword
    keywords:
      - "支払条件"
      - "違約金"
      - "責任範囲"
      - "契約条件"
      - "免責"
    recommendation: "RAG_OK投入前に契約条件に関する記述を確認し、必要に応じてマスクしてください。"
    redaction: label

  - rule_id: internal_context_keyword
    category: internal
    severity: WARNING
    type: keyword
    keywords:
      - "人事"
      - "異動"
      - "組織再編"
    recommendation: "内部情報の可能性があるため、文脈を確認してください。"
    redaction: label
